name: myapp
description: EcoCampus Market - Sustainable Campus Marketplace
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase Core
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0
  firebase_storage: ^11.6.0

  # Google Sign In
  google_sign_in: ^6.2.1

  # State Management
  flutter_bloc: ^8.1.4
  equatable: ^2.0.5

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0

  # Image
  image_picker: ^1.0.7
  http: ^1.2.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  shared_preferences: ^2.2.2
  connectivity_plus: ^5.0.2

  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  # লোগো পরিবর্তনের জন্য এই প্যাকেজটি যুক্ত করা হয়েছে
  flutter_launcher_icons: ^0.13.1

# লোগো কনফিগারেশন
flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/app_logo.png" # নিশ্চিত করুন আপনার লোগোটি এই পাথে আছে
  adaptive_icon_background: "#4CAF50" # লোগোর ব্যাকগ্রাউন্ড কালার (ঐচ্ছিক)
  adaptive_icon_foreground: "assets/images/app_logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/